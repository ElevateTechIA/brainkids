<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a6375"/>
      <stop offset="100%" style="stop-color:#4ecdc4"/>
    </linearGradient>
    <linearGradient id="brain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="50%" style="stop-color:#ffd93d"/>
      <stop offset="100%" style="stop-color:#4ecdc4"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <!-- Subtle inner glow -->
  <rect x="16" y="16" width="480" height="480" rx="100" ry="100" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <!-- Brain icon -->
  <g transform="translate(256,240) scale(1.1)" fill="url(#brain)">
    <!-- Left hemisphere -->
    <path d="M-20,-80 C-70,-80 -110,-50 -110,-10 C-110,0 -105,10 -95,18 C-115,30 -120,55 -105,75 C-100,82 -92,87 -83,89 C-85,100 -78,112 -65,118 C-55,123 -43,122 -35,116 C-30,125 -18,130 -5,128 L-5,-80 Z" opacity="0.95"/>
    <!-- Right hemisphere -->
    <path d="M20,-80 C70,-80 110,-50 110,-10 C110,0 105,10 95,18 C115,30 120,55 105,75 C100,82 92,87 83,89 C85,100 78,112 65,118 C55,123 43,122 35,116 C30,125 18,130 5,128 L5,-80 Z" opacity="0.95"/>
    <!-- Brain folds left -->
    <path d="M-5,-60 C-35,-55 -55,-35 -60,-10" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="5" stroke-linecap="round"/>
    <path d="M-5,-25 C-40,-20 -70,0 -75,30" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="5" stroke-linecap="round"/>
    <path d="M-5,10 C-30,15 -55,35 -55,60" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="5" stroke-linecap="round"/>
    <!-- Brain folds right -->
    <path d="M5,-60 C35,-55 55,-35 60,-10" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="5" stroke-linecap="round"/>
    <path d="M5,-25 C40,-20 70,0 75,30" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="5" stroke-linecap="round"/>
    <path d="M5,10 C30,15 55,35 55,60" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="5" stroke-linecap="round"/>
    <!-- Center line -->
    <line x1="0" y1="-85" x2="0" y2="130" stroke="rgba(255,255,255,0.3)" stroke-width="4"/>
    <!-- Sparkles -->
    <circle cx="-85" cy="-55" r="6" fill="#ffd93d" opacity="0.9"/>
    <circle cx="90" cy="-60" r="5" fill="#ffd93d" opacity="0.8"/>
    <circle cx="-70" cy="85" r="4" fill="#ffd93d" opacity="0.7"/>
    <circle cx="75" cy="80" r="5" fill="#ffd93d" opacity="0.8"/>
  </g>
  <!-- Text "BK" -->
  <text x="256" y="420" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="72" fill="white" opacity="0.95">BrainKids</text>
</svg>
